# ReachScanner Configuration

# Server Configuration
server.port=8080

# Repository Cloning
reachscanner.clone.base-dir=./temp/repos

# CodeQL Configuration
# IMPORTANT: Use .cmd extension on Windows!
reachscanner.codeql.executable=F:\\Projects\\reach-ai\\codeql\\codeql.cmd
reachscanner.codeql.database-dir=./codeql-dbs
reachscanner.codeql.queries-dir=./codeql-queries
reachscanner.codeql.timeout-minutes=30
# Skip Maven build for faster analysis (no build tools required)
reachscanner.codeql.skip-build=true

# AI Service (Iteration 3)
reachscanner.ai-service.url=http://localhost:8001
reachscanner.ai-service.timeout-seconds=60
reachscanner.ai-service.enabled=true

# Logging
logging.level.com.reachai.reachscanner=DEBUG
logging.level.root=INFO