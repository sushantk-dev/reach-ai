<div class="app-container">
  <header class="app-header">
    <div class="container">
      <div class="header-content">
        <h1 class="logo">
          <span class="logo-icon">
            <svg viewBox="0 0 24 24" fill="currentColor">
              <path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zM9 6c0-1.66 1.34-3 3-3s3 1.34 3 3v2H9V6zm9 14H6V10h12v10z"/>
              <circle cx="14.5" cy="15.5" r="2.5" opacity="0.7"/>
              <path d="M16.5 17.5l2 2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
          </span>
          ReachAI
        </h1>
        <p class="tagline">Security Vulnerability Analysis with AI-Powered Insights</p>
      </div>
    </div>
  </header>

  <main class="app-main">
    <div class="container">
      <app-scan-form #scanForm></app-scan-form>
      
      <app-scan-results 
        *ngIf="scanForm.scanResults" 
        [scanResults]="scanForm.scanResults">
      </app-scan-results>
    </div>
  </main>

  <footer class="app-footer">
    <div class="container">
      <p>&copy; 2024 ReachAI. Built with Spring Boot, FastAPI, and Angular.</p>
      <p class="footer-note">Iteration 5 - Basic UI Complete</p>
    </div>
  </footer>
</div>
